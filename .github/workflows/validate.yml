name: Validate
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC — detect nixpkgs drift
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: nix flake check
        run: nix flake check 2>&1 | tee /tmp/check.log

      - name: nix fmt --check
        run: nix fmt -- --check .

      - name: statix
        run: nix shell nixpkgs#statix --command statix check .

      - name: Classify errors
        if: failure()
        run: bash scripts/classify-errors.sh /tmp/check.log || true

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build NixOS configuration
        run: nix build .#nixosConfigurations.alice.config.system.build.toplevel --no-link

      - name: Build Home Manager configuration
        run: nix build .#homeConfigurations.sasha.activationPackage --no-link
