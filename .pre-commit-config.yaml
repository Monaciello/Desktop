repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^secrets/
      - id: end-of-file-fixer
        exclude: ^secrets/
      - id: check-yaml
        exclude: ^secrets/
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-case-conflict

  - repo: local
    hooks:
      - id: statix
        name: statix (anti-pattern checker)
        entry: statix check
        language: system
        files: \.nix$
        pass_filenames: false

      - id: deadnix
        name: deadnix (unused code)
        entry: deadnix -e .
        language: system
        files: \.nix$
        pass_filenames: false
        exclude: ^hosts/alice/hardware/keyboard\.nix$

      - id: nix-fmt
        name: nixfmt --check (tracked *.nix, excludes secrets/)
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && files=$(git ls-files "*.nix" | grep -v "^secrets/" || true) && [ -z "$files" ] || echo "$files" | xargs nixfmt --check'
        language: system
        pass_filenames: false

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
