repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-case-conflict

  - repo: local
    hooks:
      - id: statix
        name: statix (anti-pattern checker)
        entry: statix check
        language: system
        files: \.nix$
        pass_filenames: false

      - id: deadnix
        name: deadnix (unused code)
        entry: deadnix -e .
        language: system
        files: \.nix$
        pass_filenames: false

      - id: nix-fmt
        name: nix fmt
        entry: nix fmt -- --check .
        language: system
        files: \.nix$
        pass_filenames: false

      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
